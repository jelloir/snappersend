# di-snapsend configuration — installed to /etc/snapsend/config by
# `di-snapsend.sh --source`, then tuned in place. Parsed with tomllib (stdlib).
# This file lives on the SOURCE host (the sending side) and points at the
# DESTINATION host (the receiving side).
#
# Precedence for operational settings: CLI flag > env var > this file.
#   --server / $SNAPSEND_SERVER     overrides [server].host (the destination)
#   --dry-run / $SNAPSEND_DRY_RUN    forces a no-op dry run
#   --no-mbuffer                     overrides [server].use_mbuffer
# Retention is POLICY — file-only, no CLI/env equivalent (SPEC §9).

# [server] = the DESTINATION host di-snapsend ships snapshots to over SSH.
[server]
host        = "dest-host"                # destination hostname/IP (FQDN or /etc/hosts name) — EDIT THIS
ssh_port    = 22                         # destination SSH port
user        = "snapsend"                 # dedicated least-privilege transport user (created by --dest)
ssh_key     = "/etc/snapsend/ssh/id_ed25519"   # private key for the transport user (generated by --source)
use_mbuffer = true                       # pipe through mbuffer to smooth throughput + show a rate readout
# Single base for ALL tiers on the destination. Every tier lands under
# <recv_base>/<hostname>/..., where <hostname> is THIS (source) machine's name,
# derived automatically (socket.gethostname) — so multiple source machines can
# share one destination with zero collision. Snapshot tiers go to
# <recv_base>/<hostname>/<subvol>/<date>-<num>-<short_uuid>/snapshot; the boot
# tier to <recv_base>/<hostname>/{boot,boot-efi}. (SPEC §4/§8/§11)
recv_base   = "/srv/snapshots-recv"

# Non-Btrfs boot tier (/boot ext4, /boot/efi FAT32): a single current rsync
# mirror, NOT versioned here — the downstream restic-on-server tier versions the
# receive area for free. Independent + fail-safe vs the snapshot tiers (SPEC §11).
# Lands under the same <recv_base>/<hostname>/ as the snapshot tiers.
[boot]
enabled   = true
paths     = ["/boot", "/boot/efi"]       # efi nested last; trailing-slash handled

# One table per replicated subvolume — `mountpoint` only (where Snapper's
# .snapshots lives). The destination is composed from [server].recv_base +
# hostname + the table name, so received subvols land at
# <recv_base>/<hostname>/<name>/<date>-<num>-<short_uuid>/snapshot and the
# <name>.latest symlink (restic's stable target) is maintained beside them.
[subvolumes.home]
mountpoint = "/home"

[subvolumes.root]
mountpoint = "/"

# TARGET-side retention ONLY (Decision 1): di-snapsend never prunes source
# snapshots — Snapper owns local retention. [retention.default] is the fallback;
# per-subvol tables override it. The pinned incremental parent (Rule 3) is always
# kept regardless of these numbers, so you can tune them freely.
[retention]
# Calendar used for daily/weekly/monthly bucket boundaries (global, all subvols).
#   "local" (default) — buckets align to THIS machine's local calendar, so a
#                       "Monday weekly" is your local Monday. Recommended.
#   "utc"             — buckets use UTC boundaries; fully timezone-independent,
#                       for strict cross-zone determinism / shared setups.
# Folder NAMES are always local-time + UTC offset regardless of this setting.
timezone = "local"

[retention.default]
keep_daily   = 14
keep_weekly  = 8
keep_monthly = 6

[retention.root]
keep_daily   = 30                        # keep apt pre/post upgrade history longer
keep_weekly  = 12
keep_monthly = 12
